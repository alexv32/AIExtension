<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="settings.css">
    <title>Settings - AI Assistant Pro</title>
</head>

<body>
    <div class="settings-container">
        <header class="header">
            <button class="btn-icon" id="backBtn" title="Back">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
            </button>
            <h1 class="header-title-text">Settings</h1>
            <div style="width: 36px"></div>
        </header>

        <div class="settings-body">
            <div class="settings-card glass">
                <div class="card-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                </div>
                <div class="form-group">
                    <label class="label" for="providerSelect">AI Provider</label>
                    <select class="select" id="providerSelect">
                        <option value="">Select a provider...</option>
                        <option value="openai">ChatGPT (OpenAI)</option>
                        <option value="google">Gemini (Google)</option>
                        <option value="anthropic">Claude (Anthropic)</option>
                    </select>
                </div>
                <div class="form-group" id="modelGroup" style="display: none;">
                    <label class="label" for="modelSelect">Model</label>
                    <select class="select" id="modelSelect">
                        <option value="">Select a model...</option>
                    </select>
                </div>
                <div class="form-group" id="customModelGroup" style="display: none;">
                    <label class="label" for="customModelInput">Custom Model ID</label>
                    <input type="text" class="input" id="customModelInput" placeholder="e.g., gpt-4.5-preview">
                    <p class="key-hint">💡 Enter any model ID supported by the provider's API</p>
                </div>
            </div>

            <div class="settings-card glass">
                <div class="card-icon name-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </div>
                <div class="form-group">
                    <label class="label" for="aiNameInput">AI Name</label>
                    <input type="text" class="input" id="aiNameInput" placeholder="e.g., Jarvis, Friday, Atlas...">
                </div>
                <p class="key-hint">💬 Say <strong>"Hey <span id="namePreview">Name</span>"</strong> in chat to activate
                    voice input</p>
            </div>

            <div class="settings-card glass">
                <div class="card-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                </div>
                <div class="form-group">
                    <label class="label" for="apiKeyInput">API Key</label>
                    <div class="key-input-wrapper">
                        <input type="password" class="input" id="apiKeyInput" placeholder="Enter your API key...">
                        <button class="btn-icon toggle-visibility" id="toggleKey" title="Show/Hide">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" id="eyeIcon">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>
                <p class="key-hint lock-hint">Your API key is encrypted with AES-256-GCM before storage</p>
            </div>

            <button class="btn btn-primary save-btn" id="saveBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
                Save Settings
            </button>

            <div class="save-feedback" id="saveFeedback">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                </svg>
                Settings saved successfully!
            </div>
        </div>
    </div>

    <script src="crypto.js"></script>
    <script src="settings.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="popup.css">
  <title>AI Assistant Pro</title>
</head>

<body>
  <div class="popup-container">
    <header class="header">
      <button class="btn-icon menu-btn" id="menuBtn" title="Options">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="5" r="2" />
          <circle cx="12" cy="12" r="2" />
          <circle cx="12" cy="19" r="2" />
        </svg>
      </button>
      <div class="header-title">
        <div class="logo-glow"></div>
        <h1>AI Assistant</h1>
      </div>
      <button class="btn-icon" id="settingsBtn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
        </svg>
      </button>
    </header>

    <div class="dropdown-menu" id="dropdownMenu">
      <button class="dropdown-item" id="addButtonBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Add New Button
      </button>
    </div>

    <div class="model-badge" id="modelBadge">
      <span class="model-dot"></span>
      <span id="currentModel">No model selected</span>
    </div>

    <div class="buttons-area">
      <button class="main-btn chat-btn" id="chatBtn">
        <div class="main-btn-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        </div>
        <div class="main-btn-content">
          <span class="main-btn-title">Chat</span>
          <span class="main-btn-desc">Start a conversation with AI</span>
        </div>
        <svg class="main-btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </button>
      <div id="customButtonsArea"></div>
    </div>

    <div class="empty-hint" id="emptyHint">
      <p>Click <strong>⋮</strong> to add custom AI-powered buttons</p>
    </div>
  </div>

  <!-- Add Button Modal -->
  <div class="modal-overlay" id="addButtonModal">
    <div class="modal glass">
      <div class="modal-header">
        <h2>Add New Button</h2>
        <button class="btn-icon" id="closeModal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="mode-toggle">
          <button class="mode-btn active" id="linkModeBtn">Direct Link</button>
          <button class="mode-btn" id="aiModeBtn">AI Architect</button>
        </div>

        <div class="form-group">
          <label class="label" for="buttonName">Button Name</label>
          <input type="text" class="input" id="buttonName" placeholder="e.g., Google, Summarize Page">
        </div>

        <div id="linkFields">
          <div class="form-group">
            <label class="label" for="buttonUrl">URL</label>
            <input type="text" class="input" id="buttonUrl" placeholder="https://google.com">
          </div>
        </div>

        <div id="aiFields" style="display: none;">
          <div class="form-group">
            <label class="label" for="buttonDesc">Architectural Prompt</label>
            <textarea class="input" id="buttonDesc"
              placeholder="Describe a complex action or menu...&#10;e.g., A 'Media' menu with sub-buttons for YouTube controls"></textarea>
          </div>
          <p class="key-hint">✨ AI Architect will design the logic and structures</p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn btn-primary" id="createBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          Create
        </button>
      </div>
      <div class="modal-loading" id="modalLoading">
        <div class="spinner"></div>
        <span>AI is building your button...</span>
      </div>
    </div>
  </div>

  <script src="crypto.js"></script>
  <script src="custom-buttons.js"></script>
  <script src="popup.js"></script>
</body>

</html>
